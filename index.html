<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta de CEP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Consulta de CEP</h1>
    <p>Digite um CEP para ver o endereço.</p>

    <form id="cep-form">
      <label for="cep">CEP</label>
      <input type="text" id="cep" placeholder="Ex: 01001-000" maxlength="9" autocomplete="off">
      <div class="botoes">
        <button type="submit">Consultar</button>
        <button type="button" id="btn-limpar">Limpar</button>
      </div>
    </form>

    <p id="erro" class="mensagem-erro"></p>

    <div id="resultado"></div>

    <button type="button" id="btn-tema">🌙 Modo escuro</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
